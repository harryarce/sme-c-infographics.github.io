<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>UTM Link Builder | SME&amp;C Infographics</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ms-blue:       #0078D4;
      --ms-blue-dark:  #005A9E;
      --ms-canvas:     #F3F2F1;
      --ms-surface:    #FFFFFF;
      --ms-border:     #EDEBE9;
      --ms-text:       #201F1E;
      --ms-text-muted: #605E5C;
      --ms-shadow:     0 2px 6px rgba(0,0,0,.12), 0 0 1px rgba(0,0,0,.08);
      --radius:        4px;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--ms-canvas);
      color: var(--ms-text);
      min-height: 100vh;
      padding: 32px 16px;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      background: var(--ms-surface);
      border: 1px solid var(--ms-border);
      border-radius: var(--radius);
      box-shadow: var(--ms-shadow);
      padding: 32px;
    }
    h1 { font-size: 1.6rem; margin-bottom: 8px; color: var(--ms-blue-dark); }
    .lede { color: var(--ms-text-muted); margin-bottom: 24px; }
    label {
      display: block;
      font-weight: 600;
      margin: 16px 0 4px;
    }
    .hint { color: var(--ms-text-muted); font-weight: 400; font-size: .85rem; margin-left: 6px; }
    input[type=text], input[type=url], select {
      width: 100%;
      padding: 8px 10px;
      font: inherit;
      border: 1px solid var(--ms-border);
      border-radius: var(--radius);
      background: #fff;
    }
    input:focus, select:focus { outline: 2px solid var(--ms-blue); outline-offset: 1px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }
    .actions { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }
    button {
      font: inherit;
      padding: 10px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--ms-blue);
      background: var(--ms-blue);
      color: #fff;
      cursor: pointer;
    }
    button.secondary { background: #fff; color: var(--ms-blue); }
    button:hover { background: var(--ms-blue-dark); border-color: var(--ms-blue-dark); color: #fff; }
    button.secondary:hover { color: #fff; }
    .output {
      margin-top: 24px;
      padding: 16px;
      background: #F8F7F6;
      border: 1px solid var(--ms-border);
      border-radius: var(--radius);
      word-break: break-all;
      font-family: 'Cascadia Code', Consolas, monospace;
      font-size: .9rem;
      min-height: 60px;
    }
    .output:empty::before {
      content: 'Fill in a URL above and click "Generate" to build a tracked link.';
      color: var(--ms-text-muted);
      font-family: inherit;
      font-style: italic;
    }
    .error { color: #A4262C; margin-top: 8px; }
    .ok { color: #107C10; margin-top: 8px; }
  </style>
  <script defer src="https://a.ndme.sh/script.js" data-website-id="9478c1a0-93c6-4c21-855a-69e50e15cbc4"></script>
<style>/* smec-back-btn v1 */
.smec-back-btn { position: fixed; bottom: 16px; left: 16px; z-index: 9999;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 0; min-width: 44px; height: 44px; padding: 0; border-radius: 22px;
  background: rgba(0, 120, 212, 0.92); color: #fff; text-decoration: none;
  font: 600 13px/1 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18); backdrop-filter: blur(6px);
  opacity: 0;
  animation: smec-back-btn-in 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
  /* Collapsing: wait for the label to fade out, then shrink the pill. */
  transition:
    padding 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.2s,
    gap 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.2s,
    background 0.35s ease 0s,
    box-shadow 0.35s ease 0s;
  overflow: hidden; white-space: nowrap; }
.smec-back-btn__icon { flex: 0 0 auto;
  transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1) 0.2s; }
.smec-back-btn__label { max-width: 0; opacity: 0;
  /* Collapsing: label fades out first, then its width collapses with the pill. */
  transition:
    opacity 0.18s ease 0s,
    max-width 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.2s; }

/* Expanding: pill and label grow together in one motion; text appears near the end. */
.smec-back-btn:hover, .smec-back-btn:focus-visible {
  gap: 10px; padding: 0 18px 0 12px;
  background: rgba(0, 90, 158, 0.96); color: #fff; text-decoration: none;
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.22);
  transition:
    padding 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0s,
    gap 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0s,
    background 0.35s ease 0s,
    box-shadow 0.35s ease 0s; }
.smec-back-btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
.smec-back-btn:hover .smec-back-btn__icon,
.smec-back-btn:focus-visible .smec-back-btn__icon {
  transform: translateX(-2px);
  transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1) 0s; }
.smec-back-btn:hover .smec-back-btn__label,
.smec-back-btn:focus-visible .smec-back-btn__label {
  max-width: 260px; opacity: 1;
  transition:
    max-width 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0s,
    opacity 0.3s ease 0.3s; }

@keyframes smec-back-btn-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@media (hover: none) {
  .smec-back-btn { gap: 10px; padding: 0 18px 0 12px; }
  .smec-back-btn__label { max-width: 260px; opacity: 1; }
}
@media (prefers-reduced-motion: reduce) {
  .smec-back-btn, .smec-back-btn__icon, .smec-back-btn__label,
  .smec-back-btn:hover, .smec-back-btn:focus-visible,
  .smec-back-btn:hover .smec-back-btn__icon,
  .smec-back-btn:focus-visible .smec-back-btn__icon,
  .smec-back-btn:hover .smec-back-btn__label,
  .smec-back-btn:focus-visible .smec-back-btn__label {
    transition: background 0.2s ease, color 0.2s ease;
    animation: none; opacity: 1; }
}
@media (max-width: 600px) { .smec-back-btn { bottom: 12px; left: 12px; } }
</style>

<body>
<a href="/" class="smec-back-btn" data-smec-back-button="v1" aria-label="Back to SME&amp;C Infographics"><svg class="smec-back-btn__icon" aria-hidden="true" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg><span class="smec-back-btn__label">Back to SME&amp;C Infographics</span></a>

  <div class="wrap">
    <h1>UTM Link Builder</h1>
    <p class="lede">
      Generate a tracked link that routes through
      <code>redirect.htm</code> so Umami records the click before
      forwarding the visitor to the destination URL with UTM parameters
      appended.
    </p>

    <form id="builder" autocomplete="off">
      <label for="dest">Destination URL <span class="hint">(http or https)</span></label>
      <input type="url" id="dest" name="dest" required
             placeholder="https://example.com/page" />

      <div class="row">
        <div>
          <label for="src">utm_source <span class="hint">(required)</span></label>
          <input type="text" id="src" name="src" required list="src-list"
                 placeholder="newsletter" />
          <datalist id="src-list">
            <option value="newsletter">
            <option value="email">
            <option value="linkedin">
            <option value="twitter">
            <option value="blog">
          </datalist>
        </div>
        <div>
          <label for="medium">utm_medium <span class="hint">(required)</span></label>
          <input type="text" id="medium" name="medium" required list="medium-list"
                 placeholder="email" />
          <datalist id="medium-list">
            <option value="email">
            <option value="social">
            <option value="cpc">
            <option value="organic">
            <option value="referral">
          </datalist>
        </div>
      </div>

      <label for="campaign">utm_campaign <span class="hint">(required)</span></label>
      <input type="text" id="campaign" name="campaign" required
             placeholder="april-2026-monthly" />

      <div class="row">
        <div>
          <label for="content">utm_content <span class="hint">(optional)</span></label>
          <input type="text" id="content" name="content"
                 placeholder="header-cta" />
        </div>
        <div>
          <label for="term">utm_term <span class="hint">(optional)</span></label>
          <input type="text" id="term" name="term"
                 placeholder="keyword" />
        </div>
      </div>

      <div class="actions">
        <button type="submit">Generate</button>
        <button type="button" class="secondary" id="copy">Copy link</button>
        <button type="reset" class="secondary">Reset</button>
      </div>
      <div id="msg"></div>
    </form>

    <div class="output" id="out" aria-live="polite"></div>
  </div>

  <script>
    (function () {
      "use strict";

      // Hard-coded so the generated links always point at the canonical
      // production redirect, even when this builder is opened from a
      // local clone or preview environment.
      var REDIRECT_BASE = "https://sme-c-infographics.github.io/redirect.htm";

      var form = document.getElementById("builder");
      var out = document.getElementById("out");
      var msg = document.getElementById("msg");
      var copyBtn = document.getElementById("copy");

      function setMsg(text, ok) {
        msg.textContent = text || "";
        msg.className = ok ? "ok" : "error";
      }

      function buildLink() {
        var dest = document.getElementById("dest").value.trim();
        var src = document.getElementById("src").value.trim();
        var medium = document.getElementById("medium").value.trim();
        var campaign = document.getElementById("campaign").value.trim();
        var content = document.getElementById("content").value.trim();
        var term = document.getElementById("term").value.trim();

        if (!dest || !src || !medium || !campaign) {
          setMsg("Please fill in URL, source, medium, and campaign.", false);
          return null;
        }
        // Reject anything other than http/https up front so the
        // redirect page can rely on the same allow-list.
        var lower = dest.toLowerCase();
        if (!(lower.indexOf("http://") === 0 || lower.indexOf("https://") === 0)) {
          setMsg("URL must start with http:// or https://", false);
          return null;
        }

        var params = new URLSearchParams();
        params.set("url", dest);
        params.set("utm_source", src);
        params.set("utm_medium", medium);
        params.set("utm_campaign", campaign);
        if (content) params.set("utm_content", content);
        if (term) params.set("utm_term", term);

        return REDIRECT_BASE + "?" + params.toString();
      }

      form.addEventListener("submit", function (ev) {
        ev.preventDefault();
        var link = buildLink();
        if (link) {
          out.textContent = link;
          setMsg("", true);
        } else {
          out.textContent = "";
        }
      });

      form.addEventListener("reset", function () {
        out.textContent = "";
        setMsg("", true);
      });

      copyBtn.addEventListener("click", function () {
        var link = out.textContent.trim() || buildLink();
        if (!link) return;
        // If the user clicks Copy without first clicking Generate,
        // populate the output box too so they can verify what's on
        // their clipboard.
        out.textContent = link;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link).then(
            function () { setMsg("Copied to clipboard.", true); },
            function () { setMsg("Could not copy automatically — select the link and copy manually.", false); }
          );
        } else {
          setMsg("Clipboard API unavailable — select the link and copy manually.", false);
        }
      });
    })();
  </script>
</body>
