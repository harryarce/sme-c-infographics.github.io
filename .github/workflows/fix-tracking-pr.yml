name: Fix Tracking Snippet on PR

on:
  pull_request:
    paths:
      - "**/*.html"
      - "scripts/ensure-tracking.py"
      - ".github/workflows/fix-tracking-pr.yml"

permissions:
  contents: write

jobs:
  fix-tracking:
    # Skip PRs from forks: the default GITHUB_TOKEN cannot push back to them.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Ensure tracking snippet in HTML pages
        run: python3 scripts/ensure-tracking.py

      - name: Commit any additions back to the PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A -- '*.html'
          if git diff --staged --quiet; then
            echo "Tracking snippet already present on all HTML pages."
          else
            git commit -m "chore: ensure Umami tracking snippet on all pages"
            git push origin HEAD:${{ github.head_ref }}
          fi
