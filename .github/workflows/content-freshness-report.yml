name: Content Freshness Report

# Monthly LLM-assisted content freshness scan. Report-only: opens an
# issue summarizing suggestions, NEVER commits to pages. Humans apply
# edits by hand. Requires AZURE_OPENAI_* secrets to be configured on the
# repository. If the secrets are absent the job is a no-op.

on:
  schedule:
    # 07:00 UTC on the 1st of every month.
    - cron: "0 7 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: content-freshness-report
  cancel-in-progress: false

jobs:
  suggest:
    runs-on: ubuntu-latest
    env:
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
      AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Skip if secrets missing
        id: guard
        run: |
          if [ -z "$AZURE_OPENAI_ENDPOINT" ] || [ -z "$AZURE_OPENAI_API_KEY" ] || [ -z "$AZURE_OPENAI_DEPLOYMENT" ]; then
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate suggestions
        if: steps.guard.outputs.has_secrets == 'true'
        run: python3 scripts/suggest-content-updates.py

      - name: Upload suggestions as artifact
        if: steps.guard.outputs.has_secrets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: content-suggestions
          path: reports/content-suggestions/*.md
          if-no-files-found: ignore

      - name: Open tracking issue
        if: steps.guard.outputs.has_secrets == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const dir = "reports/content-suggestions";
            if (!fs.existsSync(dir)) {
              core.info("No suggestions directory; skipping issue.");
              return;
            }
            const files = fs.readdirSync(dir).filter(f => f.endsWith(".md"));
            if (!files.length) {
              core.info("No suggestion files; skipping issue.");
              return;
            }
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const lines = [
              "_Category: content-freshness (automated)_",
              "",
              "This monthly content-freshness scan produced suggestions for the following pages.",
              "",
              "Full markdown suggestions are attached as the `content-suggestions` workflow artifact:",
              runUrl,
              "",
              "Suggestions are review-only — nothing has been committed. Edit pages manually where appropriate.",
              "",
              "### Pages with suggestions",
              "",
            ];
            for (const f of files.sort()) {
              lines.push(`- \`${f}\``);
            }
            // Attempt to include labels if they exist on the repo; fall back
            // silently if they don't (avoids 422 Validation Failed).
            const preferredLabels = ["content-freshness", "automated"];
            let labelsToUse = [];
            try {
              const existing = await github.paginate(
                github.rest.issues.listLabelsForRepo,
                { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
              );
              const existingNames = new Set(existing.map(l => l.name));
              labelsToUse = preferredLabels.filter(n => existingNames.has(n));
            } catch (err) {
              core.info(`Could not list labels (${err.message}); creating issue without labels.`);
            }
            const today = new Date().toISOString().slice(0, 10);
            const issueParams = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Content freshness suggestions — ${today}`,
              body: lines.join("\n"),
            };
            if (labelsToUse.length) {
              issueParams.labels = labelsToUse;
            }
            await github.rest.issues.create(issueParams);
